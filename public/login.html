<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AUBazaar</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/images/africa-university-logo.png" alt="AU Logo" class="login-logo">
      <h1>AU<span>Bazaar</span></h1>
      <p>Africa University Campus Marketplace</p>
    </div>

    <h2 class="auth-title">Welcome Back!</h2>
    <p class="auth-subtitle">Sign in to your AUBazaar account</p>

    <div id="alert-container"></div>

    <button class="btn btn-primary btn-block btn-lg" onclick="handleGoogleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google" style="vertical-align:middle;margin-right:8px">
      Continue with Google
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>

    <div style="margin-top:1rem;padding:1rem;background:#eaf4fb;border-radius:8px;font-size:0.82rem;color:var(--primary)">
      <i class="fas fa-university"></i> <strong>AU Students Only:</strong> You must have a valid @africau.edu Google account to use this app.
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script>
  // Redirect if already logged in - but not while handleGoogleLogin() is
  // actively deciding whether to accept this sign-in. Without this guard,
  // the moment signInWithPopup() resolves (before handleGoogleLogin's own
  // registration check even runs), this listener sees "a user is signed
  // in" and redirects immediately - completely bypassing the check below,
  // since it doesn't know or care whether a Firestore account exists.
  AUBazaar.auth.onAuthStateChanged((user) => {
    if (user && !window.__authFlowInProgress) {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || '/marketplace';
      window.location.href = redirect;
    }
  });

  if (new URLSearchParams(window.location.search).get('suspended') === '1') {
    showAlert('Your account has been suspended. If you believe this is a mistake, please <a href="/contact">contact us</a>.', 'danger');
  }

  async function handleGoogleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    // Always show Google's account chooser instead of silently reusing
    // whatever account is already active on this device - important on a
    // borrowed/shared phone where someone else's Google session is live.
    // 'consent select_account' is a stronger signal than 'select_account'
    // alone - Google can otherwise skip the picker when only one account
    // is active, treating it as an unambiguous "selection".
    provider.setCustomParameters({ hd: 'africau.edu', prompt: 'consent select_account' });

    window.__authFlowInProgress = true;

    try {
      const result = await AUBazaar.auth.signInWithPopup(provider);
      const user = result.user;

      // Verify AU email domain
      if (!AUBazaar.isValidAUEmail(user.email)) {
        await AUBazaar.auth.signOut();
        showAlert('Must sign in with a valid @africau.edu or @students.africau.edu Google account.', 'danger');
        return;
      }

      // Login only works for accounts that already registered - silently
      // creating one here would skip the role choice (Student/Faculty/
      // Staff) and Terms agreement that /register requires.
      const userRef = AUBazaar.db.collection('users').doc(user.uid);
      const existingDoc = await userRef.get();

      if (!existingDoc.exists) {
        await AUBazaar.auth.signOut();
        showAlert('No account found for this email. Please <a href="/register">register</a> first.', 'warning');
        return;
      }

      const existingData = existingDoc.data();

      if (existingData.status === 'suspended') {
        await AUBazaar.auth.signOut();
        showAlert('Your account has been suspended. If you believe this is a mistake, please <a href="/contact">contact us</a>.', 'danger');
        return;
      }

      // Only record that a login happened - don't re-write profile fields
      // like fullName/photoURL, which would silently overwrite anything
      // the user customized in Edit Profile with their raw Google values.
      await userRef.set({
        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      // Sync localStorage with Firestore user data
      localStorage.setItem('uid', user.uid);
      localStorage.setItem('role', existingData.role || 'student');
      localStorage.setItem('sellerStatus', existingData.sellerStatus || 'none');
      localStorage.setItem('paymentRef', existingData.paymentRef || '');

      showAlert('Login successful!', 'success');
      setTimeout(() => {
        window.location.href = '/marketplace';
      }, 1000);

    } catch (error) {
      if (error.code !== 'auth/popup-closed-by-user') {
        showAlert('Google login failed. Please try again.', 'danger');
      }
    } finally {
      window.__authFlowInProgress = false;
    }
  }

  function showAlert(message, type) {
    const container = document.getElementById('alert-container');
    container.innerHTML = `<div class="alert alert-${type}"><i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}</div>`;
  }
</script>
</body>
</html>
