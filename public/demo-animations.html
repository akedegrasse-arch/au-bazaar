<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AU Bazaar Animations Demo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      color: white;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    p {
      color: rgba(255,255,255,0.8);
      margin-bottom: 40px;
    }

    .marketplace {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
    }

    /* PRODUCT CARD */
    .card {
      width: 220px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
    }

    .card:hover {
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .card h3 {
      margin: 12px 0 8px;
      font-size: 1.1rem;
      color: #333;
    }

    .price {
      font-weight: bold;
      font-size: 1.3rem;
      color: #667eea;
      margin: 10px 0;
    }

    .rating {
      color: #ffc107;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    /* BADGES */
    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .badge-trending {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
    }

    .badge-top-seller {
      background: linear-gradient(135deg, #fa709a, #fee140);
      color: white;
    }

    .badge-new {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
    }

    /* DELETE BUTTON */
    .delete {
      background: #e63946;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-size: 0.85rem;
    }

    .delete:hover {
      background: #c1121f;
    }

    .delete:active {
      transform: scale(0.95);
    }

    /* FADE DELETE ANIMATION */
    .fade-out {
      opacity: 0;
      transform: scale(0.9) rotateX(10deg);
      transition: 0.3s ease-out;
      pointer-events: none;
    }

    /* CARD ACTIONS */
    .card-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    .btn-action {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
    }

    .btn-buy {
      background: #667eea;
      color: white;
    }

    .btn-buy:hover {
      background: #5568d3;
      transform: scale(1.1);
    }

    .btn-favorite {
      background: #f0f0f0;
      color: #666;
    }

    .btn-favorite:hover {
      background: #ff6b6b;
      color: white;
      transform: scale(1.1);
    }

    /* FAVORITE ACTIVE */
    .btn-favorite.active {
      background: #ff6b6b;
      color: white;
      animation: heartBeat 0.6s ease;
    }

    @keyframes heartBeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.3); }
      50% { transform: scale(1); }
      75% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <h1>🎨 AU Bazaar Animation Demo</h1>
  <p>Hover over cards for tilt effect • Click buttons to see animations</p>

  <div class="marketplace">

    <div class="card">
      <span class="badge badge-trending">🔥 Trending</span>
      <img src="https://picsum.photos/200/150" alt="Product">
      <h3>Wireless Headphones</h3>
      <div class="rating">⭐⭐⭐⭐⭐ (4.9)</div>
      <div class="price">$25</div>
      <div class="card-actions">
        <button class="btn-action btn-favorite" onclick="toggleFavorite(this)">
          <i class="fas fa-heart"></i>
        </button>
        <button class="btn-action btn-buy">
          <i class="fas fa-shopping-cart"></i>
        </button>
        <button class="delete" onclick="deleteCard(this)">Delete</button>
      </div>
    </div>

    <div class="card">
      <span class="badge badge-top-seller">🏆 Top Seller</span>
      <img src="https://picsum.photos/200/151" alt="Product">
      <h3>Gaming Mouse</h3>
      <div class="rating">⭐⭐⭐⭐ (4.2)</div>
      <div class="price">$18</div>
      <div class="card-actions">
        <button class="btn-action btn-favorite" onclick="toggleFavorite(this)">
          <i class="fas fa-heart"></i>
        </button>
        <button class="btn-action btn-buy">
          <i class="fas fa-shopping-cart"></i>
        </button>
        <button class="delete" onclick="deleteCard(this)">Delete</button>
      </div>
    </div>

    <div class="card">
      <span class="badge badge-new">🆕 New</span>
      <img src="https://picsum.photos/200/152" alt="Product">
      <h3>Laptop Stand</h3>
      <div class="rating">⭐⭐⭐⭐⭐ (5.0)</div>
      <div class="price">$15</div>
      <div class="card-actions">
        <button class="btn-action btn-favorite" onclick="toggleFavorite(this)">
          <i class="fas fa-heart"></i>
        </button>
        <button class="btn-action btn-buy">
          <i class="fas fa-shopping-cart"></i>
        </button>
        <button class="delete" onclick="deleteCard(this)">Delete</button>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/200/153" alt="Product">
      <h3>USB-C Hub</h3>
      <div class="rating">⭐⭐⭐⭐ (4.5)</div>
      <div class="price">$12</div>
      <div class="card-actions">
        <button class="btn-action btn-favorite" onclick="toggleFavorite(this)">
          <i class="fas fa-heart"></i>
        </button>
        <button class="btn-action btn-buy">
          <i class="fas fa-shopping-cart"></i>
        </button>
        <button class="delete" onclick="deleteCard(this)">Delete</button>
      </div>
    </div>

  </div>

  <script>
    /* DELETE ANIMATION */
    function deleteCard(button) {
      const card = button.closest('.card');
      card.classList.add('fade-out');
      
      setTimeout(() => {
        card.remove();
      }, 300);
    }

    /* FAVORITE TOGGLE */
    function toggleFavorite(button) {
      button.classList.toggle('active');
      const icon = button.querySelector('i');
      if (button.classList.contains('active')) {
        icon.classList.remove('far');
        icon.classList.add('fas');
      } else {
        icon.classList.remove('fas');
        icon.classList.add('far');
      }
    }

    /* MOUSE TILT EFFECT */
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        const rotateX = (y - centerY) / 10;
        const rotateY = (centerX - x) / 10;
        
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
      });

      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
      });
    });
  </script>
</body>
</html>
