<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AUBazaar</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-card { max-width: 520px; }
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.8rem;
    }
    .role-option {
      border: 2px solid var(--gray-light);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .role-option:hover {
      border-color: var(--primary-light);
    }
    .role-option.selected {
      border-color: var(--primary);
      background: #eaf4fb;
    }
    .role-option input { display: none; }
    .role-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .role-label { font-size: 0.85rem; font-weight: 600; color: var(--dark); }
    .terms-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.88rem;
      color: var(--gray);
      flex-wrap: wrap;
    }
    .terms-check input { margin-top: 3px; flex-shrink: 0; min-width: 18px; }
    .terms-check a { color: var(--primary); text-decoration: none; }
    .terms-check a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/images/africa-university-logo.png" alt="AU Logo" class="login-logo">
      <h1>AU<span>Bazaar</span></h1>
      <p>Africa University Campus Marketplace</p>
    </div>

    <h2 class="auth-title">Create Your Account</h2>
    <p class="auth-subtitle">Join the AU campus marketplace community</p>

    <div id="alert-container"></div>

    <form id="register-form" onsubmit="handleGoogleRegister(event)">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> Full Name <span style="color:red">*</span></label>
        <input type="text" class="form-control" id="fullName" placeholder="Your full name" required>
        <div class="form-error hidden" id="fullName-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-id-card"></i> Student/Staff ID <span style="color:red">*</span></label>
        <input type="text" class="form-control" id="studentId" placeholder="e.g., AU2024001" required>
        <div class="form-hint">Your university ID from the registry</div>
        <div class="form-error hidden" id="studentId-error"></div>
      </div>

      <!-- Role Selection -->
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user-tag"></i> I am a <span style="color:red">*</span></label>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-top:0.5rem">
          <div class="role-option selected" onclick="selectRole('student', this)" style="text-align:center;padding:1rem;cursor:pointer;border:2px solid var(--primary);border-radius:8px;transition:all 0.2s;background:#eaf4fb">
            <div class="role-icon" style="font-size:1.5rem;color:var(--primary)"><i class="fas fa-graduation-cap"></i></div>
            <div style="font-weight:600;font-size:0.85rem">Student</div>
          </div>
          <div class="role-option" onclick="selectRole('faculty', this)" style="text-align:center;padding:1rem;cursor:pointer;border:2px solid var(--gray-light);border-radius:8px;transition:all 0.2s">
            <div class="role-icon" style="font-size:1.5rem;color:var(--primary)"><i class="fas fa-chalkboard-teacher"></i></div>
            <div style="font-weight:600;font-size:0.85rem">Faculty</div>
          </div>
          <div class="role-option" onclick="selectRole('staff', this)" style="text-align:center;padding:1rem;cursor:pointer;border:2px solid var(--gray-light);border-radius:8px;transition:all 0.2s">
            <div class="role-icon" style="font-size:1.5rem;color:var(--primary)"><i class="fas fa-briefcase"></i></div>
            <div style="font-weight:600;font-size:0.85rem">Staff</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="terms-check">
          <input type="checkbox" id="terms" required>
          I agree to the <a href="/terms" target="_blank">Terms and Conditions</a>
        </label>
        <div class="form-error hidden" id="terms-error"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google" style="vertical-align:middle;margin-right:8px">
        Continue with Google
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>

    <div style="margin-top:1rem;padding:1rem;background:#eaf4fb;border-radius:8px;font-size:0.82rem;color:var(--primary)">
      <i class="fas fa-university"></i> <strong>AU Students Only:</strong> You must have a valid @africau.edu Google account to use this app.
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script>
  let selectedRole = 'student';

  // Redirect if already logged in
  AUBazaar.auth.onAuthStateChanged((user) => {
    if (user) window.location.href = '/marketplace';
  });

  function selectRole(role, el) {
    selectedRole = role;
    document.querySelectorAll('.role-option').forEach(opt => {
      opt.classList.remove('selected');
      opt.style.borderColor = 'var(--gray-light)';
      opt.style.background = '';
    });
    el.classList.add('selected');
    el.style.borderColor = 'var(--primary)';
    el.style.background = '#eaf4fb';
  }

  async function handleGoogleRegister(e) {
    if (e) e.preventDefault();
    clearErrors();

    const fullName = document.getElementById('fullName').value.trim();
    const studentId = document.getElementById('studentId').value.trim();
    const terms = document.getElementById('terms').checked;

    if (!fullName) {
      showFieldError('fullName-error', 'Please enter your full name');
      return;
    }
    if (!studentId) {
      showFieldError('studentId-error', 'Please enter your Student/Staff ID');
      return;
    }
    if (!terms) {
      showFieldError('terms-error', 'You must agree to the terms and conditions');
      return;
    }

    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ hd: 'africau.edu' });

    try {
      const result = await AUBazaar.auth.signInWithPopup(provider);
      const user = result.user;

      const isValid = AUBazaar.isValidAUEmail(user.email);
      if (!isValid) {
        await AUBazaar.auth.signOut();
        showAlert('Must sign up with a valid @africau.edu or @students.africau.edu Google account.', 'danger');
        return;
      }

      // Don't clobber an existing account's role/stats if they land here again
      const userRef = AUBazaar.db.collection('users').doc(user.uid);
      const existingDoc = await userRef.get();

      if (existingDoc.exists) {
        await userRef.set({ lastLogin: Date.now() }, { merge: true });
      } else {
        await userRef.set({
          fullName: fullName,
          studentId: studentId,
          email: user.email,
          photoURL: user.photoURL,
          role: selectedRole || 'student',
          status: 'active',
          rating: 0,
          ratingCount: 0,
          totalListings: 0,
          totalSales: 0,
          favorites: [],
          createdAt: Date.now(),
          lastLogin: Date.now()
        });
      }

      showAlert('Account created successfully!', 'success');
      setTimeout(() => window.location.href = '/marketplace', 1000);

    } catch (error) {
      if (error.code !== 'auth/popup-closed-by-user') {
        showAlert('Google sign-up failed. Please try again.', 'danger');
      }
    }
  }

  function showAlert(message, type) {
    const container = document.getElementById('alert-container');
    container.innerHTML = `<div class="alert alert-${type}"><i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}</div>`;
  }

  function showFieldError(id, message) {
    const el = document.getElementById(id);
    el.textContent = message;
    el.classList.remove('hidden');
  }

  function clearErrors() {
    document.getElementById('alert-container').innerHTML = '';
    document.querySelectorAll('.form-error').forEach(el => el.classList.add('hidden'));
  }
</script>
</body>
</html>
